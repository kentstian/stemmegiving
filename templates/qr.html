{% extends 'base.html' %}
{% block title %}QR Code - QR Voting{% endblock %}
{% block content %}
<div class="card">
    <h1>Poll QR code</h1>
    <p>Scan this code with a mobile device to open the voting page.</p>
    <div class="vote-card" style="text-align:center;">
        <img src="{{ url_for('static', filename='qr/' ~ qr_filename) }}" alt="QR code" style="max-width:100%; height:auto;" />
        <p><a href="{{ url_for('static', filename='qr/' ~ qr_filename) }}" download>Download QR code</a></p>
        <p>Voting link: <a href="{{ vote_url }}">{{ vote_url }}</a></p>
    </div>
    <p><a class="button" href="{{ url_for('edit_poll', poll_id=poll.id) }}">Back to poll</a></p>
</div>
{% endblock %}
